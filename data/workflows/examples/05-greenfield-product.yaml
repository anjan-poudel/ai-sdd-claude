# Workflow: Greenfield Product — Full SDD
#
# WHO:    Product team building something new end-to-end
# WHEN:   New product, new service, or major new capability from scratch
# AGENTS: ba → architect → pe → le → dev → reviewer (all 6)
# HIL:    on at requirements (PO sign-off) and L1 architecture (tech lead)
# GATES:  T0 for design phases; T1 for implementation

version: "1"
name: greenfield-product
description: "Full greenfield: requirements → architecture → design → plan → implement → review"

defaults:
  overlays:
    policy_gate: { risk_tier: T0 }
  max_rework_iterations: 2

tasks:
  define-requirements:
    use: define-requirements

  design-l1:
    use: design-architecture
    depends_on: [define-requirements]

  design-l2:
    use: design-component
    depends_on: [design-l1]

  review-l2:
    use: review-l2
    depends_on: [design-l2]
    exit_conditions:
      - "review.decision == GO"

  plan-tasks:
    use: plan-tasks
    depends_on: [review-l2]

  implement:
    use: standard-implement
    depends_on: [plan-tasks]
    overlays:
      confidence: { enabled: true, threshold: 0.80 }
    max_rework_iterations: 4

  review-implementation:
    use: review-implementation
    depends_on: [implement]
