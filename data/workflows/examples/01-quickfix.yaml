# Workflow: Quick Fix / Hotfix
#
# WHO:    Solo dev or small team with a known bug to fix
# WHEN:   Bug is already understood; no design needed; just fix + verify
# AGENTS: dev → reviewer
# HIL:    off (speed is the priority)
# GATES:  T1 (tests must pass before review)

version: "1"
name: quickfix
description: "Minimal hotfix workflow: implement a known fix, then verify it"

defaults:
  overlays:
    hil: { enabled: false }
  max_rework_iterations: 2

tasks:
  implement-fix:
    use: standard-implement
    depends_on: []
    outputs:
      - path: .ai-sdd/outputs/fix-summary.md

  verify-fix:
    use: standard-review
    depends_on: [implement-fix]
