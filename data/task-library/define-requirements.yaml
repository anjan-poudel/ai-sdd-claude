name: define-requirements
agent: ba
description: |
  Elicit and document project requirements. Produce a requirements document
  with functional requirements, non-functional requirements, and Gherkin
  acceptance criteria for each requirement.
overlays:
  hil:         { enabled: true }    # BA output typically needs stakeholder review
  policy_gate: { risk_tier: T0 }    # acceptance: document must be present
outputs:
  - path: ".ai-sdd/outputs/{{task_id}}.md"
    contract: requirements_doc
