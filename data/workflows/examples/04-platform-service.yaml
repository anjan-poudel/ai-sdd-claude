# Workflow: Platform / Infrastructure Service
#
# WHO:    Platform or infrastructure teams building shared services
# WHEN:   Greenfield or significant rework of a shared component
# AGENTS: architect → pe (×2 parallel) → dev (×2 parallel) → reviewer
# HIL:    on after architecture (platform lead reviews)
# GATES:  T1 throughout

version: "1"
name: platform-service
description: "Platform/infra service: architecture → parallel component design → parallel impl → review"

defaults:
  overlays:
    policy_gate: { risk_tier: T1 }
  max_rework_iterations: 3

tasks:
  design-l1:
    use: design-architecture

  design-component-a:
    use: design-component
    depends_on: [design-l1]
    description: |
      Produce detailed component design for Component A
      (as defined in design-l1.md). Include: module structure,
      public interface, integration points with B, test strategy.

  design-component-b:
    use: design-component
    depends_on: [design-l1]              # parallel with design-component-a
    description: |
      Produce detailed component design for Component B
      (as defined in design-l1.md). Include: module structure,
      public interface, integration points with A, test strategy.

  implement-component-a:
    use: standard-implement
    depends_on: [design-component-a, design-component-b]
    outputs:
      - path: .ai-sdd/outputs/impl-component-a-notes.md
        contract: implementation

  implement-component-b:
    use: standard-implement
    depends_on: [design-component-a, design-component-b]
    outputs:
      - path: .ai-sdd/outputs/impl-component-b-notes.md
        contract: implementation

  review-component-a:              # focused review of Component A only
    use: review-implementation
    depends_on: [implement-component-a]

  review-component-b:              # focused review of Component B only — parallel with review-component-a
    use: review-implementation
    depends_on: [implement-component-b]
