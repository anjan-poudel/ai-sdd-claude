name: design-component
phase: design
agent: pe
description: |
  Produce L2 component design documents. Define component interfaces,
  data models, error handling strategy, and observability approach.
  Consult the requirements lock file (specs/<requirements-task-id>.lock.yaml)
  and the L1 architecture document to ensure component designs stay within scope.
overlays:
  hil:         { enabled: false }   # PE works under the architect's approved design
  policy_gate: { risk_tier: T0 }    # acceptance: document must be present
outputs:
  - path: "specs/{{task_id}}.md"
    contract: component_design_l2
