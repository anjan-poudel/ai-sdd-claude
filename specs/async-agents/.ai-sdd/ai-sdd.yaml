version: "1"

adapter:
  type: claude_code

engine:
  max_concurrent_tasks: 3
  cost_budget_per_run_usd: 10.00

overlays:
  hil:
    enabled: true

collaboration:
  enabled: true
  adapters:
    notification: slack
    document: confluence
    task_tracking: jira
    code_review: github
  slack:
    notify_channel: ai-sdd
    mentions:
      ba: []          # fill with Slack user IDs, e.g. ["U01234567"]
      pe: []
      le: []
      dev: []
      reviewer: []
  confluence:
    space_key: AISDD
    parent_page_title: ai-sdd Artifacts
  jira:
    project_key: AST
