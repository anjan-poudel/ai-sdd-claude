version: "1"

contracts:
  requirements_doc:
    name: requirements_doc
    version: "1"
    description: "Requirements index produced by the BA agent (define-requirements/index.md). Links to FR/ and NFR/ subfolders."
    sections:
      - Summary
      - Contents
    fields:
      overview:
        required: false
        type: string
        description: "Project overview (optional in index — detail lives in FR/NFR files)"

  architecture_l1:
    name: architecture_l1
    version: "1"
    description: "L1 architecture document produced by the architect agent"
    sections:
      - Overview
      - Architecture
      - Components
    fields:
      technology_stack:
        required: false
        type: string

  component_design_l2:
    name: component_design_l2
    version: "1"
    description: "L2 component design document produced by the PE agent"
    sections:
      - Overview
      - Components
      - Interfaces

  task_breakdown_l3:
    name: task_breakdown_l3
    version: "1"
    description: "L3 task breakdown produced by the LE agent (plan-tasks/plan.md). Links to tasks/ subfolder of individual T-NNN.md files."
    sections:
      - Summary
      - Contents

  implementation:
    name: implementation
    version: "1"
    description: "Implementation artifact produced by the developer agent"
    fields:
      description:
        required: true
        type: string

  review_report:
    name: review_report
    version: "1"
    description: "Review report produced by the reviewer agent"
    sections:
      - Summary
      - Decision
    fields:
      decision:
        required: true
        type: string
        description: "GO or NO_GO"

  spec_gate_report:
    name: spec_gate_report
    version: "1"
    description: "Spec gate pre-implementation review report"
    sections:
      - Evidence Checklist
      - HIL Sign-Off

  requirements_lock:
    name: requirements_lock
    version: "1"
    description: |
      Immutable requirements snapshot produced by the BA agent after stakeholder sign-off.
      YAML format. Records spec_hash, locked FR/NFR list, acceptance criteria hashes,
      assumptions, and constraints. Downstream tasks consume this file to detect drift.
    fields:
      spec_hash:
        required: true
        type: string
        description: "SHA-256 of the normalized requirements content at lock time"
      locked_at:
        required: true
        type: string
        description: "ISO 8601 timestamp of lock"
      requirements:
        required: true
        type: array
        description: "List of locked FR/NFR identifiers with their content hashes"

  spec_hash:
    name: spec_hash
    version: "1"
    description: |
      Lightweight hash artifact produced by any phase that needs to declare a stable
      content fingerprint for drift detection. Used by coding-standards gate validators.
    fields:
      hash:
        required: true
        type: string
        description: "SHA-256 content hash"
      source_paths:
        required: true
        type: array
        description: "Paths that were hashed to produce this value"
