name: review-l2
phase: review
agent: reviewer
description: |
  Review the L2 component design. Verify component interfaces are correct,
  data models are complete, and the design aligns with L1 architecture.
  Issue GO/NO_GO decision.
overlays:
  hil:         { enabled: false }
  review:      { enabled: true }
  policy_gate: { risk_tier: T1 }
outputs:
  - path: "specs/{{task_id}}.md"
    contract: review_report
