# Workflow: Regulated / Enterprise — Full Evidence Gates + HIL + Paired Challenger
#
# WHO:    Teams in regulated domains (fintech, healthcare, security-critical infra)
# WHEN:   Any change requiring audit trail, formal sign-offs, and evidence of correctness
# AGENTS: All 6 agents + paired challenger on implementation
# HIL:    T2 gates at requirements, architecture, and final sign-off (mandatory)

version: "1"
name: regulated-enterprise
description: "Full regulated workflow with T2 gates, evidence collection, and audit trail"

defaults:
  overlays:
    hil: { enabled: false }
    policy_gate: { risk_tier: T0 }
  max_rework_iterations: 3

tasks:
  define-requirements:
    use: define-requirements
    description: |
      Produce a formal requirements specification for regulatory review.
      Include: scope with change request reference, stakeholders, functional
      requirements (FR-NNN), NFRs, compliance requirements (GDPR/SOC2/PCI-DSS
      etc.), data classification, Gherkin ACs, traceability matrix.
    overlays:
      hil: { enabled: true }
      policy_gate: { risk_tier: T2 }    # compliance officer + PO must approve

  design-l1:
    use: design-architecture
    depends_on: [define-requirements]
    description: |
      Produce L1 architecture with explicit security and compliance considerations.
      Standard architecture plus: threat model (STRIDE), data residency,
      audit logging design, access control model, encryption model, compliance mapping.
    overlays:
      hil: { enabled: true }
      policy_gate: { risk_tier: T2 }    # architecture review board must approve

  design-l2:
    use: design-component
    depends_on: [design-l1]
    description: |
      Produce L2 component design. Standard design plus: input validation spec,
      output encoding, secrets management, PII handling, audit event schemas.

  security-design-review:
    use: security-design-review
    depends_on: [design-l2]             # parallel with review-l2

  review-l2:
    use: review-l2
    depends_on: [design-l2]             # parallel with security-design-review

  plan-tasks:
    use: plan-tasks
    depends_on: [security-design-review, review-l2]    # both reviews must GO
    description: |
      Standard task breakdown plus: flag [SECURITY], [PII], [AUDIT] tasks;
      map each task to the compliance requirement it satisfies.
      Order: infrastructure → security controls → business logic → audit logging → tests.

  implement:
    use: standard-implement
    depends_on: [plan-tasks]
    description: |
      Implement all tasks. [SECURITY]: no shortcuts. [PII]: mask in logs + prove it.
      [AUDIT]: log entries must match L2 schema exactly.
      Coverage ≥ 85%; no secrets in code or fixtures.
    overlays:
      policy_gate: { risk_tier: T1 }
      confidence: { enabled: true, threshold: 0.85 }
      paired: { enabled: true }
    max_rework_iterations: 5

  security-test:
    use: security-test
    depends_on: [implement]

  final-sign-off:
    use: final-sign-off
    depends_on: [security-test]
