# Workflow: Platform / Infrastructure Service
#
# WHO:    Platform or infrastructure teams building shared services
# WHEN:   Greenfield or significant rework of a shared component
# AGENTS: architect → pe (×2 parallel) → dev (×2 parallel) → reviewer
# HIL:    on after architecture (platform lead reviews)
# GATES:  T1 throughout

version: "1"
name: platform-service
description: "Platform/infra service: architecture → parallel component design → parallel impl → review"

defaults:
  overlays:
    policy_gate: { risk_tier: T1 }
  max_rework_iterations: 3

tasks:
  design-architecture:
    use: design-architecture
    description: |
      Design the system architecture for this platform service.
      Requirements are in the constitution. Produce:
      - Component breakdown, data flow, external dependencies
      - Operational model, security model
      - Component A and B definitions: responsibility, interface, contracts

  design-component-a:
    use: design-component
    depends_on: [design-architecture]
    description: |
      Produce detailed component design for Component A
      (as defined in design-architecture.md). Include: module structure,
      public interface, integration points with B, test strategy.

  design-component-b:
    use: design-component
    depends_on: [design-architecture]    # parallel with design-component-a
    description: |
      Produce detailed component design for Component B
      (as defined in design-architecture.md). Include: module structure,
      public interface, integration points with A, test strategy.

  implement-component-a:
    use: standard-implement
    depends_on: [design-component-a, design-component-b]
    outputs:
      - path: .ai-sdd/outputs/impl-component-a-notes.md
        contract: implementation

  implement-component-b:
    use: standard-implement
    depends_on: [design-component-a, design-component-b]
    outputs:
      - path: .ai-sdd/outputs/impl-component-b-notes.md
        contract: implementation

  review-implementation:
    use: review-implementation
    depends_on: [implement-component-a, implement-component-b]
    description: |
      Review both components together as an integrated system.
      1. Each component matches its design (interface, module structure)
      2. Integration contracts are honored by both sides
      3. No unplanned coupling between components
      4. Error handling consistent across both components
      Issue a single GO/NO_GO. List findings per component.
