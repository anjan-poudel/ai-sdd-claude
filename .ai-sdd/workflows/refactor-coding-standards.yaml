version: "1"
name: refactor-coding-standards
description: |
  Post-merge cleanup of the coding-standards repo. Archives redundant files,
  updates documentation to reference ai-sdd and RMS for the three-project
  ecosystem, adds MCP resource endpoints for schemas, redirects graph/query
  tool development to repeatability-mcp-server, and updates CI templates.
  Target repo: /Users/anjan/workspace/projects/coding-standards
  Specs: specs/refactor-coding-standards/
  Ecosystem: docs/ecosystem-proposal-opus.md

defaults:
  overlays:
    policy_gate: { risk_tier: T0 }
    hil: { enabled: true }
  max_rework_iterations: 3

tasks:

  # ── Phase 1: Archive Redundant Files ──────────────────────────────────────

  rcs-001:
    agent: dev
    description: |
      Archive 6 redundant files to archive/merged-to-ai-sdd/.
      git mv each file, prepend archive header with ai-sdd cross-references,
      create archive/merged-to-ai-sdd/README.md with mapping table.
      Files: state-machine.yaml, events-contract.md, run-phase.sh,
      check-iteration-limits.sh, COMBINED-AGENTIC-LOOP.md, AGENT-LOOP-PATTERN.md.
      Spec: specs/refactor-coding-standards/tasks/RCS-001-archive-redundant-files.md

  # ── Phase 2: Update Documentation ─────────────────────────────────────────

  rcs-002:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add "Integration with ai-sdd" section to coding-standards README.md.
      Cover architecture split, usage together, what moved, where to find it.
      Spec: specs/refactor-coding-standards/tasks/RCS-002-readme-integration-section.md
    overlays:
      hil: { enabled: false }

  rcs-003:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Remove orchestration directives from coding-standards CLAUDE.md.
      Remove requirements-first protocol, phase routing, pre-flight checklists,
      state transition rules, iteration limit instructions.
      Keep MCP server, analysis, validation, schema, query engine instructions.
      Add "enforcement handled by ai-sdd" pointer at top.
      Spec: specs/refactor-coding-standards/tasks/RCS-003-claude-md-orchestration-removal.md

  rcs-004:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add ai-sdd note to top of coding-standards AGENTS.md.
      Single blockquote: "Task orchestration handled by ai-sdd. This project
      provides read-only analysis tools."
      Spec: specs/refactor-coding-standards/tasks/RCS-004-agents-md-note.md
    overlays:
      hil: { enabled: false }

  rcs-005:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add ai-sdd cross-references to agents/constitution.md.
      Annotate rules #2 (lock immutability), #4 (no gold-plating), #5 (planning review)
      with notes about which ai-sdd overlay enforces them.
      Add general cross-reference note at top.
      Spec: specs/refactor-coding-standards/tasks/RCS-005-constitution-cross-references.md
    overlays:
      hil: { enabled: false }

  rcs-006:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add YAML comment header to toolgate.yaml explaining that tool gates
      are enforced at runtime by ai-sdd's PolicyGateOverlay and this file
      is a reference template.
      Spec: specs/refactor-coding-standards/tasks/RCS-006-toolgate-overlay-reference.md
    overlays:
      hil: { enabled: false }

  rcs-007:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Update workflow/index.md after archival. Remove broken links to
      state-machine.yaml and events-contract.md. Add "Archived Files"
      section with pointers to archive/ and ai-sdd equivalents.
      Spec: specs/refactor-coding-standards/tasks/RCS-007-workflow-index-update.md
    overlays:
      hil: { enabled: false }

  rcs-008:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add "Using with ai-sdd" section to MANUAL.md covering three integration
      patterns: MCP server integration, CI pipeline integration, architecture
      split. Include integration diagram.
      Spec: specs/refactor-coding-standards/tasks/RCS-008-manual-integration-section.md
    overlays:
      hil: { enabled: false }

  # ── Phase 3: MCP Server: Resources + RMS Redirect ────────────────────────

  rcs-009:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add DEPRECATION.md to tools/mcp-server/ and tools/query-engine/.
      Explain that CS graph tools are frozen and new features go to RMS.
      Include CS→RMS tool mapping table. Update READMEs to reference RMS.
      NO new query tools in CS — those go to repeatability-mcp-server.
      Spec: specs/refactor-coding-standards/tasks/RCS-009-mcp-server-query-tools.md
    overlays:
      hil: { enabled: false }

  rcs-010:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Add MCP resource endpoints for 4 key schemas/docs:
      requirements-input.schema.yaml, requirements-input.po.schema.yaml,
      requirements-lock.md, acceptance-criteria-format.md.
      Use MCP resources/list and resources/read protocol.
      Spec: specs/refactor-coding-standards/tasks/RCS-010-mcp-resource-endpoints.md

  # ── Phase 4: CI Template Updates ──────────────────────────────────────────

  rcs-011:
    agent: dev
    depends_on: [rcs-001]
    description: |
      Audit CI templates for references to archived scripts or enforcement
      commands. Update or remove references to run-phase.sh,
      check-iteration-limits.sh, state-machine.yaml, events-contract.md.
      Add integration note to CI docs if present.
      Spec: specs/refactor-coding-standards/tasks/RCS-011-ci-template-updates.md
    overlays:
      hil: { enabled: false }

  rcs-012:
    agent: dev
    depends_on: [rcs-010]
    description: |
      Add ai-sdd interop integration test for MCP server. Test resource
      endpoints (4 URIs return correct content), existing graph tool regression
      (standard 7-step call sequence), error handling for missing/malformed
      inputs. Optional CS↔RMS compatibility check if RMS is available.
      Spec: specs/refactor-coding-standards/tasks/RCS-012-interop-test.md
