name: plan-tasks
agent: le
description: |
  Break down the component designs into concrete implementation tasks.
  Define acceptance criteria (including Gherkin tests) per task, identify
  dependencies, and estimate effort. Output is a folder of one file per task
  plus an index.
overlays:
  hil:         { enabled: false }   # LE decomposes after reviews have passed
  policy_gate: { risk_tier: T0 }    # acceptance: index must be present
outputs:
  - path: "specs/{{task_id}}/plan.md"
    contract: task_breakdown_l3
  - path: "specs/{{task_id}}/tasks/"
