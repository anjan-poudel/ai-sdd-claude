name: review-l1
phase: review
agent: reviewer
description: |
  Review the L1 architecture document. Verify it addresses all requirements,
  check for architectural risks, and provide GO/NO_GO decision.
overlays:
  hil:         { enabled: false }
  review:      { enabled: true }
  policy_gate: { risk_tier: T1 }
outputs:
  - path: "specs/{{task_id}}.md"
    contract: review_report
