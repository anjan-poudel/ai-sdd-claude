name: define-requirements
agent: ba
description: |
  Elicit and document project requirements. Produce a structured folder of
  requirements: one file per FR, one file per NFR, with Gherkin acceptance
  criteria embedded in each file, and index files at each folder level.
overlays:
  hil:         { enabled: true }    # BA output typically needs stakeholder review
  policy_gate: { risk_tier: T0 }    # acceptance: index must be present
outputs:
  - path: ".ai-sdd/outputs/{{task_id}}/index.md"
    contract: requirements_doc
