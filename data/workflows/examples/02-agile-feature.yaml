# Workflow: Agile Feature
#
# WHO:    Agile feature team (BA + devs)
# WHEN:   A product feature with known scope, no architectural unknowns
# AGENTS: ba → dev → reviewer
# HIL:    on for BA output only (product owner approves requirements)
# GATES:  T0 for requirements, T1 for implementation

version: "1"
name: agile-feature
description: "Agile feature: BA defines story → dev implements → reviewer verifies"

defaults:
  overlays:
    policy_gate: { risk_tier: T1 }
  max_rework_iterations: 3

tasks:
  define-story:
    use: define-requirements
    depends_on: []
    # Template provides: agent=ba, description, hil=true, T0, requirements_doc contract
    # Override: custom description when you need story-specific detail (optional)

  implement:
    use: standard-implement
    depends_on: [define-story]

  review:
    use: standard-review
    depends_on: [implement]
